spring.application.name=LearningRESTAPIs

# Database Configuration (local DB)
spring.datasource.url=jdbc:postgresql://localhost:5432/My_Practice?currentSchema=springbootdemo
spring.datasource.username=postgres
spring.datasource.password=Bappa@1996
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA (developer-friendly)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Optional: customize HikariCP behavior
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.pool-name=MyHikariPool